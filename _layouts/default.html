<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
<head>
  {% include head.html %}
  <title>{% if page.title %}{{ page.title | xml_escape }} — {% endif %}{{ site.title | default: site.github.repository_name | xml_escape }}</title>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to content</a>

  {% include header.html %}

  <main id="main-content" class="site-content">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>

  {% include footer.html %}
</body>
</html>
