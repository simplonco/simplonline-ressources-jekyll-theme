<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="{{ '/assets/images/favicon-32.png' | relative_url }}" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}" sizes="180x180">
<meta name="description" content="{{ page.description | default: site.description | xml_escape }}">
<meta name="generator" content="Jekyll v{{ jekyll.version }}">

<meta property="og:title" content="{{ page.title | default: site.title | xml_escape }}">
<meta property="og:description" content="{{ page.description | default: site.description | xml_escape }}">
<meta property="og:type" content="website">
<meta property="og:url" content="{{ page.url | absolute_url }}">

<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
<script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
